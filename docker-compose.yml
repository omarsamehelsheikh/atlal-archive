version: '3.8'

services:
  backend:
    build: ./backend
    container_name: atlal-backend
    restart: always
    env_file:
      - .env
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: atlal-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
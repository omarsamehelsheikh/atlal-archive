version: '3.8'

services:
  backend:
    build: ./backend
    container_name: atlal-backend
    restart: always
    env_file:
      - .env
    ports:
      - "5001:5000"

  frontend:
    build: ./frontend
    container_name: atlal-frontend
    restart: always
    # Giving the container a bit more overhead during build
    mem_limit: 1024m 
    ports:
      - "80:80"
    depends_on:
      - backend
name: CI/CD Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # --- BUILD FRONTEND ---
      - name: Install Frontend Deps & Build
        run: |
          cd frontend
          npm install --legacy-peer-deps 
          npm run build

      # --- DEPLOY TO EC2 ---
      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/${{ secrets.EC2_USERNAME }}/atlal-project"

      # --- RESTART SERVICES ---
      - name: Restart Backend & Serve Frontend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Install Node & Nginx if missing
            if ! command -v npm &> /dev/null; then
              sudo apt-get update
              sudo apt-get install -y nodejs npm nginx
            fi
            
            # 2. Install PM2 globally if missing
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi

            # 3. Setup Backend
            cd /home/${{ secrets.EC2_USERNAME }}/atlal-project/backend
            npm install
            pm2 restart all || pm2 start index.js --name "atlal-backend"
            
            # 4. Setup Frontend Directory
            sudo mkdir -p /var/www/html
            sudo chown -R ${{ secrets.EC2_USERNAME }}:${{ secrets.EC2_USERNAME }} /var/www/html
            
            # 5. Move Build Files
            # Checking for 'dist' (Vite) or 'build' (CRA)
            if [ -d "/home/${{ secrets.EC2_USERNAME }}/atlal-project/frontend/dist" ]; then
              cp -r /home/${{ secrets.EC2_USERNAME }}/atlal-project/frontend/dist/* /var/www/html/
            else
              cp -r /home/${{ secrets.EC2_USERNAME }}/atlal-project/frontend/build/* /var/www/html/
            fi
            
            # 6. Final Nginx Restart
            sudo systemctl restart nginx || sudo service nginx restart
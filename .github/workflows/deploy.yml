name: Deploy Atlal Archive

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/atlal-project
            git pull origin main
            
            # Use 'docker compose' (SPACE, NO HYPHEN)
            # Remove --build so it uses cache (making it fast)
            # Remove 'down' so it doesn't kill your DB
            sudo docker compose up -d
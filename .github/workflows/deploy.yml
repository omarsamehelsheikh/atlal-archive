name: CI/CD Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Frontend Deps & Build
        run: |
          cd frontend
          npm install --legacy-peer-deps 
          npm run build

      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/${{ secrets.EC2_USERNAME }}/atlal-project"

      - name: Restart Backend & Serve Frontend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Update Node to v20
            if ! command -v node &> /dev/null || [ "$(node -v | cut -d'.' -f1)" != "v20" ]; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs nginx
            fi
            
            if ! command -v pm2 &> /dev/null; then sudo npm install -g pm2; fi

            # 2. Backend Startup
            cd /home/${{ secrets.EC2_USERNAME }}/atlal-project/backend
            npm install
            pm2 delete atlal-backend || true
            pm2 start server.js --name "atlal-backend"
            pm2 save

            # 3. Nginx Setup
            sudo mkdir -p /var/www/html
            sudo chown -R ${{ secrets.EC2_USERNAME }}:${{ secrets.EC2_USERNAME }} /var/www/html
            
            # Use a robust config writer
            printf "server {
                listen 80;
                server_name _;
                location / {
                    root /var/www/html;
                    index index.html;
                    try_files \$uri \$uri/ /index.html;
                }
                location /api/ {
                    proxy_pass http://localhost:5000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host \$host;
                }
            }" | sudo tee /etc/nginx/sites-available/default > /dev/null

            # 4. Move Frontend Files
            rm -rf /var/www/html/*
            if [ -d "/home/${{ secrets.EC2_USERNAME }}/atlal-project/frontend/dist" ]; then
              cp -r /home/${{ secrets.EC2_USERNAME }}/atlal-project/frontend/dist/* /var/www/html/
            else
              cp -r /home/${{ secrets.EC2_USERNAME }}/atlal-project/frontend/build/* /var/www/html/
            fi
            
            # 5. Final Restart
            sudo systemctl restart nginx
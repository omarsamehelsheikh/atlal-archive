name: CI/CD Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Frontend Deps & Build
        run: |
          cd frontend
          npm install --legacy-peer-deps 
          npm run build

      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/${{ secrets.EC2_USERNAME }}/atlal-project"

      - name: Restart Backend & Serve Frontend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Environment Setup
            if ! command -v node &> /dev/null || [ "$(node -v | cut -d'.' -f1)" != "v18" ]; then
              sudo apt-get update && sudo apt-get install -y ca-certificates curl gnupg
              sudo mkdir -p /etc/apt/keyrings
              curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
              echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_18.x nodistro main" | sudo tee /etc/apt/sources.list.d/nodesource.list
              sudo apt-get update && sudo apt-get install nodejs nginx -y
            fi
            
            if ! command -v pm2 &> /dev/null; then sudo npm install -g pm2; fi

            # 2. Smart Backend Start
            cd /home/${{ secrets.EC2_USERNAME }}/atlal-project/backend
            npm install
            
            # Stop existing process to avoid "Script not found" conflicts
            pm2 delete atlal-backend || true
            
            # Detect entry point (checks index.js, then server.js, then app.js)
            if [ -f "index.js" ]; then ENTRY="index.js"
            elif [ -f "server.js" ]; then ENTRY="server.js"
            elif [ -f "app.js" ]; then ENTRY="app.js"
            else echo "ERROR: No entry point found!"; exit 1; fi
            
            pm2 start $ENTRY --name "atlal-backend"
            pm2 save

            # 3. Frontend Deployment
            sudo mkdir -p /var/www/html
            sudo chown -R ${{ secrets.EC2_USERNAME }}:${{ secrets.EC2_USERNAME }} /var/www/html
            
            if [ -d "/home/${{ secrets.EC2_USERNAME }}/atlal-project/frontend/dist" ]; then
              rm -rf /var/www/html/*
              cp -r /home/${{ secrets.EC2_USERNAME }}/atlal-project/frontend/dist/* /var/www/html/
            else
              rm -rf /var/www/html/*
              cp -r /home/${{ secrets.EC2_USERNAME }}/atlal-project/frontend/build/* /var/www/html/
            fi
            
            sudo systemctl restart nginx